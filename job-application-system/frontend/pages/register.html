<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — JobTrack</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body class="auth-page">
  <div class="auth-box animate-in" style="max-width:460px;">
    <div class="auth-logo">
      <div class="logo-box">JT</div>
      <span class="auth-logo-text">JobTrack</span>
    </div>
    <h2 class="auth-title">Create an account</h2>
    <p class="auth-sub">Join JobTrack and start your journey.</p>
    <div id="registerAlert" class="alert"></div>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Juan Dela Cruz"/>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label>Account Type</label>
      <select id="role">
        <option value="applicant">Job Seeker (Applicant)</option>
        <option value="employer">Employer / Recruiter</option>
      </select>
    </div>
    <div class="form-grid-2">
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min. 8 characters"/>
      </div>
      <div class="form-group">
        <label>Confirm</label>
        <input type="password" id="confirm" placeholder="Repeat password"/>
      </div>
    </div>
    <button class="btn btn-primary" onclick="handleRegister()" style="width:100%;justify-content:center;padding:10px;margin-top:4px;">
      Create Account →
    </button>
    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
  <script src="../js/main.js"></script>
  <script>
    async function handleRegister() {
      const password = document.getElementById("password").value;
      const confirm  = document.getElementById("confirm").value;
      if (password !== confirm) return showAlert("registerAlert", "Passwords do not match.", "error");
      if (password.length < 8)  return showAlert("registerAlert", "Password must be at least 8 characters.", "error");
      try {
        await api("/auth/register", "POST", {
          name:     document.getElementById("name").value,
          email:    document.getElementById("email").value,
          role:     document.getElementById("role").value,
          password,
        });
        showAlert("registerAlert", "Account created! Redirecting...", "success");
        setTimeout(() => window.location.href = "login.html", 1400);
      } catch (e) { showAlert("registerAlert", e.message, "error"); }
    }
  </script>
</body>
</html>
