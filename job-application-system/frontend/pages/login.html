<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — JobTrack</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body class="auth-page">
  <div class="auth-box animate-in">
    <div class="auth-logo">
      <div class="logo-box">JT</div>
      <span class="auth-logo-text">JobTrack</span>
    </div>
    <h2 class="auth-title">Welcome back</h2>
    <p class="auth-sub">Sign in to your account to continue.</p>
    <div id="loginAlert" class="alert"></div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn btn-primary" onclick="handleLogin()" style="width:100%;justify-content:center;padding:10px;margin-top:4px;">
      Sign In →
    </button>
    <div class="auth-footer">
      Don't have an account? <a href="register.html">Create one</a>
    </div>
    <div class="auth-footer" style="margin-top:8px;">
      <a href="../index.html" style="color:var(--ink-muted);">← Back to home</a>
    </div>
  </div>
  <script src="../js/main.js"></script>
  <script>
    async function handleLogin() {
      try {
        const data = await api("/auth/login", "POST", {
          email: document.getElementById("email").value,
          password: document.getElementById("password").value,
        });
        localStorage.setItem("token", data.access_token);
        localStorage.setItem("user", JSON.stringify(data.user));
        window.location.href = "dashboard.html";
      } catch (e) { showAlert("loginAlert", e.message, "error"); }
    }
    document.addEventListener("keydown", e => { if (e.key === "Enter") handleLogin(); });
  </script>
</body>
</html>
